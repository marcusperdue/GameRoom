  <text x="126" y="112" fill="#35e88a" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="900">FIRST RUN SETUP</text>
  <text x="126" y="162" fill="#f7f8f3" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="900">Set up GameRoom</text>
  <g font-family="Inter,Arial,sans-serif" font-weight="850" font-size="18">
    <rect x="126" y="202" width="214" height="58" rx="12" fill="#123822" stroke="#35e88a"/>
    <circle cx="154" cy="231" r="14" fill="#35e88a"/><text x="150" y="237" fill="#06120c">1</text><text x="180" y="238" fill="#f7f8f3">Folders</text>
    <rect x="356" y="202" width="214" height="58" rx="12" fill="#172229" stroke="#33424c"/>
    <circle cx="384" cy="231" r="14" fill="#24313b"/><text x="380" y="237" fill="#aab6c1">2</text><text x="410" y="238" fill="#f7f8f3">Emulators</text>
    <rect x="586" y="202" width="214" height="58" rx="12" fill="#172229" stroke="#33424c"/>
    <circle cx="614" cy="231" r="14" fill="#24313b"/><text x="610" y="237" fill="#aab6c1">3</text><text x="640" y="238" fill="#f7f8f3">BIOS</text>
    <rect x="816" y="202" width="214" height="58" rx="12" fill="#172229" stroke="#33424c"/>
    <circle cx="844" cy="231" r="14" fill="#24313b"/><text x="840" y="237" fill="#aab6c1">4</text><text x="870" y="238" fill="#f7f8f3">Games</text>
  </g>
  <rect x="126" y="298" width="948" height="92" rx="12" fill="#132330" stroke="#25445f"/>
  <text x="154" y="338" fill="#f7f8f3" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="900">Choose your main folders</text>
  <text x="154" y="370" fill="#aab6c1" font-family="Inter,Arial,sans-serif" font-size="18">Defaults are already created inside GameRoom. Change them if your files live somewhere else.</text>
  <g font-family="Inter,Arial,sans-serif">
