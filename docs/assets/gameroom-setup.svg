    <text x="220" y="450" fill="#f7f8f3" font-size="20" font-weight="900">Games Folder</text>
    <text x="220" y="474" fill="#aab6c1" font-size="15">GameRoom/Games</text>
    <rect x="828" y="436" width="86" height="38" rx="8" fill="#172229" stroke="#33424c"/><text x="846" y="461" fill="#f7f8f3" font-size="15" font-weight="900">Choose</text>
    <rect x="928" y="436" width="74" height="38" rx="8" fill="#172229" stroke="#33424c"/><text x="951" y="461" fill="#f7f8f3" font-size="15" font-weight="900">Open</text>
    <rect x="126" y="506" width="948" height="70" rx="12" fill="#141d24" stroke="#2c3a43"/>
    <rect x="150" y="528" width="48" height="27" rx="14" fill="#233039"/><text x="163" y="547" fill="#aab6c1" font-size="13" font-weight="900">BI</text>
    <text x="220" y="536" fill="#f7f8f3" font-size="20" font-weight="900">BIOS Folder</text>
    <text x="220" y="560" fill="#aab6c1" font-size="15">GameRoom/BIOS</text>
    <rect x="828" y="522" width="86" height="38" rx="8" fill="#172229" stroke="#33424c"/><text x="846" y="547" fill="#f7f8f3" font-size="15" font-weight="900">Choose</text>
    <rect x="928" y="522" width="74" height="38" rx="8" fill="#172229" stroke="#33424c"/><text x="951" y="547" fill="#f7f8f3" font-size="15" font-weight="900">Open</text>
    <rect x="126" y="592" width="948" height="70" rx="12" fill="#141d24" stroke="#2c3a43"/>
    <rect x="150" y="614" width="48" height="27" rx="14" fill="#233039"/><text x="163" y="633" fill="#aab6c1" font-size="13" font-weight="900">EM</text>
    <text x="220" y="622" fill="#f7f8f3" font-size="20" font-weight="900">Emulators Folder</text>
    <text x="220" y="646" fill="#aab6c1" font-size="15">GameRoom/Emulators</text>
    <rect x="828" y="608" width="86" height="38" rx="8" fill="#172229" stroke="#33424c"/><text x="846" y="633" fill="#f7f8f3" font-size="15" font-weight="900">Choose</text>
    <rect x="928" y="608" width="74" height="38" rx="8" fill="#172229" stroke="#33424c"/><text x="951" y="633" fill="#f7f8f3" font-size="15" font-weight="900">Open</text>
